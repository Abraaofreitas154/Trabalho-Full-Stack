<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gerenciador" />
  <meta name="description" content="Aplicação PWA para gerenciamento de produtos e clientes com CRUD completo" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192x192.svg" />
  <link rel="icon" type="image/svg+xml" href="/icon-192x192.svg" />
  <title>Gerenciador Fullstack</title>
  <link rel="stylesheet" href="/src/css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🛒 Gerenciador Fullstack</h1>
      <p class="subtitle">Produtos e Clientes</p>
    </header>

    <div id="mensagem" class="mensagem hidden"></div>

    <!-- Navegação entre abas -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="produtos">📦 Produtos</button>
      <button class="tab-btn" data-tab="clientes">👤 Clientes</button>
    </nav>

    <!-- Seção Produtos -->
    <section id="tab-produtos" class="tab-content active">
      <div class="card">
        <h2 id="produto-titulo">Novo Produto</h2>
        <div id="produto-erro" class="error hidden"></div>
        <form id="produto-form">
          <input type="hidden" id="produto-id" />
          <div class="form-group">
            <label for="produto-nome">Nome *</label>
            <input type="text" id="produto-nome" placeholder="Nome do produto" required />
          </div>
          <div class="form-group">
            <label for="produto-descricao">Descrição</label>
            <textarea id="produto-descricao" rows="3" placeholder="Descrição do produto"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="produto-preco">Preço (R$) *</label>
              <input type="number" id="produto-preco" step="0.01" placeholder="0.00" required />
            </div>
            <div class="form-group">
              <label for="produto-quantidade">Quantidade *</label>
              <input type="number" id="produto-quantidade" placeholder="0" required />
            </div>
          </div>
          <div class="form-group">
            <label for="produto-categoria">Categoria</label>
            <input type="text" id="produto-categoria" placeholder="Categoria" value="Geral" />
          </div>
          <div class="form-group checkbox-group">
            <input type="checkbox" id="produto-ativo" checked />
            <label for="produto-ativo">Ativo</label>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="produto-submit">Cadastrar</button>
            <button type="button" class="btn btn-secondary hidden" id="produto-cancelar">Cancelar</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h2>Lista de Produtos <span id="produto-contador">(0)</span></h2>
        <div id="produto-loading" class="loading">Carregando produtos...</div>
        <div id="produto-lista" class="lista"></div>
      </div>
    </section>

    <!-- Seção Clientes -->
    <section id="tab-clientes" class="tab-content">
      <div class="card">
        <h2 id="cliente-titulo">Novo Cliente</h2>
        <div id="cliente-erro" class="error hidden"></div>
        <form id="cliente-form">
          <input type="hidden" id="cliente-id" />
          <div class="form-group">
            <label for="cliente-nome">Nome *</label>
            <input type="text" id="cliente-nome" placeholder="Nome do cliente" required />
          </div>
          <div class="form-group">
            <label for="cliente-email">E-mail *</label>
            <input type="email" id="cliente-email" placeholder="email@exemplo.com" required />
          </div>
          <div class="form-group">
            <label for="cliente-telefone">Telefone</label>
            <input type="text" id="cliente-telefone" placeholder="(00) 00000-0000" />
          </div>
          <div class="form-group">
            <label for="cliente-endereco">Endereço</label>
            <textarea id="cliente-endereco" rows="2" placeholder="Endereço completo"></textarea>
          </div>
          <div class="form-group checkbox-group">
            <input type="checkbox" id="cliente-ativo" checked />
            <label for="cliente-ativo">Ativo</label>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="cliente-submit">Cadastrar</button>
            <button type="button" class="btn btn-secondary hidden" id="cliente-cancelar">Cancelar</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h2>Lista de Clientes <span id="cliente-contador">(0)</span></h2>
        <div id="cliente-loading" class="loading">Carregando clientes...</div>
        <div id="cliente-lista" class="lista"></div>
      </div>
    </section>
  </div>

  <script src="/src/js/api.js"></script>
  <script src="/src/js/ui.js"></script>
  <script src="/src/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registrado:', reg.scope))
          .catch(err => console.log('Erro no Service Worker:', err));
      });
    }
  </script>
</body>
</html>
